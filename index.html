    :root {

      letter-spacing: 0;
      text-align: left;

    figure {

    picture,

      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    /*
      Ordinary phones retain the same 36 px type and 150 px portrait.
      Only the available line width changes, so the copy reflows naturally.
      The smaller text-to-photo gap keeps the complete composition on screen.
    */
    @media (max-width: 48rem) {
      figure {
        margin-top: 0.875rem;
      }
    }

    /*
      Exception for legacy 320–352 px screens. Reducing the scale slightly is
      preferable to horizontal clipping or forcing the user to zoom out.
    */
    @media (max-width: 22rem) {
      :root {
        --main-font-size: 1.875rem;
        --portrait-width: 7.5rem;

      figure {
        margin-top: 0.625rem;

      figcaption {
        font-size: 0.9375rem;
      }
    }

      Short landscape phones use the available horizontal space instead of
      shrinking the entire desktop layout or introducing a large vertical scroll.
    */
    @media (orientation: landscape) and (max-height: 32rem) {
      body {
        padding-inline:
          max(0.75rem, env(safe-area-inset-left))
          max(0.75rem, env(safe-area-inset-right));
      }

      main {
        width: min(100%, 56rem);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(1rem, 4vw, 2.5rem);
        padding-block:
          max(0.75rem, env(safe-area-inset-top))

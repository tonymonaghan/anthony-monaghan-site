  <style>
    :root {
      color-scheme: light;
      --page: #ffffff;
      --text: #202124;
      --content-width: 30rem;  /* 480 px */
      --portrait-width: 6rem; /* 96 px */
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--page);
    }

    html {
      min-width: 15rem;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow: hidden;
      color: var(--text);
      font-family: "Inter", Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(calc(100% - 2rem), var(--content-width));
      height: 100vh;
      height: 100svh;
      margin: 0 auto;
      padding-top: 5rem; /* 80 px – matches the original */
    }

    h1 {
      width: 100%;
      margin: 0;
      font-size: 1.5rem; /* 24 px – matches the original */
      font-weight: 400;
      line-height: 1.125;
      letter-spacing: 0;
      text-align: left;
    }

    figure {
      width: var(--portrait-width);
      margin: 3rem 0 0 auto; /* 48 px below the text */
      text-align: center;
    }

    img {
      display: block;
      width: var(--portrait-width);
      height: auto;
      border: 0;
    }

    figcaption {
      margin-top: 0.625rem; /* slightly closer than the old site */
      font-size: 0.8125rem; /* 13 px */
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    /*
      Phone layout: retain the same composition, but let the text reduce
      only as needed so the complete page remains visible without scrolling.
      The portrait remains 96 px wide in ordinary portrait orientation.
    */
    @media (max-width: 32.5rem) {
      main {
        width: calc(100% - 2rem);
        padding-top: clamp(1.5rem, 7svh, 4rem);
      }

      h1 {
        font-size: clamp(1.0625rem, 5.8vw, 1.5rem);
        line-height: 1.125;
      }

      figure {
        margin-top: clamp(1.25rem, 5svh, 3rem);
      }
    }

    /*
      Exception for short landscape phones only. Without this, any one-page
      design can exceed a very shallow mobile viewport.
    */
    @media
      (max-width: 56.25rem)
      and (max-height: 30rem)
      and (orientation: landscape)
      and (pointer: coarse) {
      main {
        width: min(calc(100% - 1.5rem), var(--content-width));
        padding-top: 0.75rem;
      }

      h1 {
        font-size: clamp(0.875rem, 4.2svh, 1.125rem);
        line-height: 1.08;

      figure {
        width: 4rem;
        margin-top: 0.625rem;
      }

      img {
        width: 4rem;
      }

      figcaption {
        margin-top: 0.25rem;
        font-size: 0.625rem;
      }
    }

    @media print {
      body {
        overflow: visible;
      }

      main {
        height: auto;
      }
    }

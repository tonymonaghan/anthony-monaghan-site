  <style>
    :root {
      color-scheme: light;
      --page: #fcfbf8;
      --text: #191918;
      --muted: #56534f;
      --content-width: 45rem;
      --statement-size: clamp(1.875rem, calc(1.65rem + 0.9vw), 2.25rem);
      --portrait-width: clamp(8rem, 36vw, 9.375rem);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-width: 15rem;
      min-height: 100%;
      background: var(--page);
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow-x: hidden;
      background: var(--page);
      color: var(--text);
      font-family:

        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(calc(100% - 2rem), var(--content-width));
      margin-block: auto;
      padding-block:
        max(1rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-bottom));
    }

    h1 {
      width: 100%;
      margin: 0;
      font-size: var(--statement-size);
      font-weight: 400;
      line-height: 1.14;
      letter-spacing: -0.025em;
      text-align: left;
      text-wrap: pretty;
      overflow-wrap: normal;
      word-break: normal;
      hyphens: none;
      hanging-punctuation: first last;
    }

    figure {
      width: var(--portrait-width);
      margin: clamp(1.75rem, 7vw, 4.75rem) 0 0 auto;
      text-align: center;
    }

    picture,
    img {
      display: block;
      width: 100%;
    }

    img {
      height: auto;
      border: 0;
      background: #eeece7;
    }

    figcaption {
      margin-top: 0.6875rem;
      color: var(--muted);
      font-size: clamp(0.9375rem, calc(0.875rem + 0.25vw), 1.0625rem);
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.015em;
      white-space: nowrap;
    }

    /*
      Phones use a fluid display scale: about 30 px on an ordinary portrait
      phone, rising smoothly to the 36 px desktop size. The portrait remains
      right-aligned but also reduces modestly on narrower screens.
    */
    @media (max-width: 48rem) {
      main {
        padding-block:
          max(1.5rem, env(safe-area-inset-top))
          max(1.5rem, env(safe-area-inset-bottom));
      }

      figure {
        margin-top: clamp(1.5rem, 6vw, 2rem);
      }
    }

    /*
      Very narrow screens retain a comfortable reading measure without
      horizontal clipping or forcing the user to zoom out.
    */
    @media (max-width: 22rem) {
      :root {
        --statement-size: 1.75rem;
        --portrait-width: 7rem;
      }

      main {
        width: calc(100% - 1.5rem);
        padding-block:
          max(0.5rem, env(safe-area-inset-top))
          max(0.5rem, env(safe-area-inset-bottom));
      }

      figure {
        margin-top: 0.625rem;
      }

      figcaption {
        font-size: 0.875rem;
      }
    }

    /*
      Short landscape phones use the available horizontal space instead of
      shrinking the entire desktop layout or introducing a large vertical scroll.
    */
    @media (orientation: landscape) and (max-height: 32rem) {
      body {
        padding-inline:
          max(0.75rem, env(safe-area-inset-left))
          max(0.75rem, env(safe-area-inset-right));
      }

      main {
        width: min(100%, 56rem);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(1rem, 4vw, 2.5rem);
        padding-block:
          max(0.75rem, env(safe-area-inset-top))
          max(0.75rem, env(safe-area-inset-bottom));
      }

      h1 {
        font-size: clamp(1.375rem, 6.5svh, 2rem);
        line-height: 1.1;
      }

      figure {
        width: clamp(5.5rem, 30svh, 7.5rem);
        margin: 0;
      }

      figcaption {
        margin-top: 0.375rem;
        font-size: clamp(0.875rem, 4svh, 1rem);
      }
    }

    @media (prefers-contrast: more) {
      :root {
        --page: #ffffff;
        --text: #000000;
        --muted: #222222;
      }
    }

    @media print {
      body {
        display: block;
      }

      main {
        width: var(--content-width);
        margin: 0 auto;

  <style>
    :root {

    * {

    body {

      min-height: 100svh;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);

        This is the native system sans-serif stack used by modern WordPress

    /*
      Exact desktop reference geometry:
      720 px text column, 36 px text and 150 px portrait.

    */

      width: min(
        45rem,
        calc(100vw - 2rem),

      margin: 0;
      font-size: 5cqi;       /* 36 px at the 720 px desktop width */

    picture,

    }

    img {
      height: auto;
      border: 0;
    }

    figcaption {
      margin-top: 1.5cqi;    /* 10.8 px – slightly closer to the photograph */
      font-size: 2.5cqi;     /* 18 px at desktop */
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
